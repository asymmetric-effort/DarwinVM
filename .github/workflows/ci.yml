name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: SwiftLint
        run: swiftlint lint --strict

  test:
    name: Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: swift test

  build:
    name: Build
    runs-on: macos-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Release build
        run: swift build -c release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: darwinvm-arm64
          path: .build/release/darwinvm

  publish:
    name: Publish Release
    runs-on: macos-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: darwinvm-arm64
          path: dist
      - name: Package binary
        run: |
          chmod +x dist/darwinvm
          tar -czf darwinvm-${GITHUB_REF_NAME}-arm64-apple-darwin.tar.gz -C dist darwinvm
          shasum -a 256 darwinvm-${GITHUB_REF_NAME}-arm64-apple-darwin.tar.gz > checksums.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            darwinvm-*.tar.gz
            checksums.txt
